<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-orange-500 p-4 text-white shadow-md">
        <div class="container mx-auto"><a href="/" class="font-bold">🏠 Quay lại trang chủ</a></div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-lg shadow-lg flex flex-col md:flex-row gap-8">
            <img class="w-full md:w-1/3 rounded-lg object-cover" src="{{ product.img }}">
            <div class="flex-1">
                <h1 class="text-3xl font-bold text-gray-800">{{ product.name }}</h1>
                <p class="text-gray-500 mt-2">Danh mục: <span class="text-orange-500 font-semibold">{{ product.category }}</span></p>
                <div class="flex items-center mt-4">
                    <span class="text-yellow-400 text-2xl">★ ★ ★ ★ ☆</span>
                    <span class="ml-2 text-gray-400">({{ product.rating }} điểm đánh giá)</span>
                </div>
                <p class="text-4xl font-bold text-orange-600 mt-6">{{ product.price }}</p>
                <div class="mt-8 flex gap-4">
                    <button class="bg-orange-100 border border-orange-500 text-orange-500 px-6 py-3 rounded font-bold">Thêm vào giỏ hàng</button>
                    <button class="bg-orange-500 text-white px-10 py-3 rounded font-bold shadow-lg">Mua ngay</button>
                </div>
            </div>
        </div>

        <h2 class="text-xl font-bold text-gray-700 mt-12 mb-6 uppercase">Sản phẩm tương tự</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            {% for item in recommendations %}
            <a href="/product/{{ item.id }}" class="bg-white rounded shadow hover:shadow-xl transition-all p-2 border border-transparent hover:border-orange-500">
                <img src="{{ item.img }}" class="h-40 w-full object-cover rounded">
                <h3 class="text-sm mt-2 text-gray-700 truncate">{{ item.name }}</h3>
                <p class="text-orange-600 font-bold mt-1">{{ item.price }}</p>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
