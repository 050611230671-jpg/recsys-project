<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee AI Clone - Trang Chủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5f5] font-sans">

    <nav class="bg-gradient-to-b from-[#f53d2d] to-[#f63] p-4 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-3xl font-bold flex items-center gap-2">
                <span class="bg-white text-[#ee4d2d] px-2 py-1 rounded-lg">S</span> Shopee AI
            </a>
            
            <div class="hidden md:flex flex-1 mx-10">
                <div class="relative w-full">
                    <input type="text" id="searchInput" 
                           placeholder="Nhập mã sản phẩm (VD: 1001 hoặc PROD-1001)..." 
                           class="w-full p-3 rounded-sm text-black outline-none shadow-inner"
                           onkeypress="if(event.key === 'Enter') executeSearch()">
                    <button onclick="executeSearch()" 
                            class="absolute right-1 top-1 bg-[#fb5533] px-6 py-2 rounded-sm hover:bg-[#f34123] transition-colors">
                        🔍
                    </button>
                </div>
            </div>

            <div class="flex gap-6 items-center text-sm font-light">
                <div class="flex items-center gap-1 cursor-pointer font-bold">🛒 5</div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="bg-white p-4 mb-6 rounded-sm shadow-sm flex items-center gap-4">
            <div class="bg-orange-100 text-[#ee4d2d] p-2 rounded-full font-bold">🔥</div>
            <h2 class="text-lg font-medium text-gray-700 uppercase">Gợi ý hôm nay</h2>
        </div>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
            {% for item in products %}
            <div class="bg-white rounded-sm shadow-sm overflow-hidden border hover:border-[#ee4d2d] transition-all flex flex-col h-full hover:-translate-y-1">
                <img class="h-40 w-full object-cover" src="{{ item.img }}" alt="{{ item.name }}">
                <div class="p-2 flex flex-col flex-grow">
                    <h3 class="text-xs text-gray-800 h-9 line-clamp-2 mb-2">{{ item.name }}</h3>
                    <div class="mt-auto">
                        <p class="text-[#ee4d2d] font-medium text-lg">${{ item.price.replace(' USD', '') }}</p>
                        <a href="/product/{{ item.id }}" class="mt-3 block text-center bg-[#ee4d2d] text-white text-xs py-1.5 rounded-sm uppercase">Xem chi tiết</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function executeSearch() {
            let query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!query) { alert("Vui lòng nhập mã sản phẩm!"); return; }
            if (/^\d+$/.test(query)) { query = "PROD-" + query; }
            window.location.href = "/product/" + query;
        }
    </script>
</body>
</html>
