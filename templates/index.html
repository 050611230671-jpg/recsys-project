<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Recsys AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #f97316;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-orange-500 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold flex items-center gap-2">
                <span>🛍️</span> Shopee AI Clone
            </a>
            <div class="hidden md:block w-1/2">
                <input type="text" placeholder="Tìm kiếm sản phẩm gợi ý..." class="w-full p-2 rounded-sm text-black outline-none">
            </div>
            <div class="flex gap-4">
                <span>Giỏ hàng</span>
                <span>Đăng nhập</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <h2 class="text-xl font-bold mb-6 text-gray-700 uppercase tracking-wider border-b-2 border-orange-500 inline-block">
            Gợi ý hôm nay
        </h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            {% for item in products %}
            <div class="product-card bg-white rounded-sm shadow-sm overflow-hidden border border-transparent transition-all duration-300">
                <div class="relative pb-[100%]">
                    <img class="absolute inset-0 h-full w-full object-cover" src="{{ item.img }}" alt="{{ item.name }}">
                </div>
                
                <div class="p-3">
                    <h3 class="text-sm text-gray-800 h-10 line-clamp-2 mb-2 leading-tight">
                        {{ item.name }}
                    </h3>
                    
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-orange-600 font-bold text-lg">{{ item.price }}</p>
                        <span class="text-[10px] text-gray-400 border border-gray-200 px-1">Yêu thích</span>
                    </div>

                    <a href="/product/{{ item.id }}" class="mt-4 block text-center bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-sm transition-colors text-sm">
                        Mua ngay
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="text-center py-10 text-gray-400 text-xs">
        © 2026 Hệ thống MLOps Recsys - Giao diện Shopee Style
    </footer>
</body>
</html>
